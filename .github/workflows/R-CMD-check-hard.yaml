# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
#
# NOTE: This workflow only directly installs "hard" dependencies, i.e. Depends,
# Imports, and LinkingTo dependencies. Notably, Suggests dependencies are never
# installed, with the exception of testthat, knitr, and rmarkdown. The cache is
# never used to avoid accidentally restoring a cache containing a suggested
# dependency.
on:
  push:
    branches: main
  pull_request:
    branches: main

name: R-CMD-check-hard.yaml

permissions: read-all

jobs:
  check-no-suggests:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,   r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      TABPFN_TOKEN: ${{ secrets.TABPFN_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          cache: false
          extra-packages: |
            any::rcmdcheck
            any::testthat
            any::knitr
            any::rmarkdown
            any::remotes
          needs: check

      - uses: astral-sh/setup-uv@v4

      - name: Setup r-reticulate venv
        run: |
          uv venv /home/runner/.virtualenvs/r-reticulate --python 3.13.1
          uv pip install tabpfn --python /home/runner/.virtualenvs/r-reticulate

      - name: Get TabPFN cache info
        id: tabpfn-cache
        shell: bash
        run: |
          VENV_PYTHON="$HOME/.virtualenvs/r-reticulate/bin/python"
          CACHE_DIR=$($VENV_PYTHON -c "from tabpfn.model_loading import get_cache_dir; print(get_cache_dir())")
          echo "dir=$CACHE_DIR" >> $GITHUB_OUTPUT
          echo "month=$(date +'%Y-%m')" >> $GITHUB_OUTPUT

      - name: Cache TabPFN models
        id: tabpfn-models-cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.tabpfn-cache.outputs.dir }}
          key: tabpfn-models-${{ runner.os }}-${{ steps.tabpfn-cache.outputs.month }}

      - name: Download TabPFN models
        if: steps.tabpfn-models-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          $HOME/.virtualenvs/r-reticulate/bin/python - <<'EOF'
          from tabpfn.model_loading import download_all_models, get_cache_dir
          import logging
          logging.basicConfig(level=logging.INFO, format="%(message)s")
          cache_dir = get_cache_dir()
          cache_dir.mkdir(parents=True, exist_ok=True)
          print(f"Downloading all models to {cache_dir}")
          download_all_models(cache_dir)
          print(f"All models downloaded to {cache_dir}")
          EOF

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
