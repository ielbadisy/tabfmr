# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:

name: test-coverage.yaml

permissions: read-all

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      TABPFN_TOKEN: ${{ secrets.TABPFN_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::xml2 remotes reticulate
          needs: coverage

      - uses: astral-sh/setup-uv@v4

      - name: Setup r-reticulate venv
        run: |
          uv venv /home/runner/.virtualenvs/r-reticulate --python 3.13.1
          uv pip install tabpfn --python /home/runner/.virtualenvs/r-reticulate

      - name: Get TabPFN cache info
        id: tabpfn-cache
        shell: bash
        run: |
          VENV_PYTHON="/home/runner/.virtualenvs/r-reticulate/bin/python"
          CACHE_DIR=$($VENV_PYTHON -c "from tabpfn.model_loading import get_cache_dir; print(get_cache_dir())")
          echo "dir=$CACHE_DIR" >> $GITHUB_OUTPUT
          echo "month=$(date +'%Y-%m')" >> $GITHUB_OUTPUT

      - name: Cache TabPFN models
        id: tabpfn-models-cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.tabpfn-cache.outputs.dir }}
          key: tabpfn-models-${{ runner.os }}-${{ steps.tabpfn-cache.outputs.month }}

      - name: Download TabPFN models
        if: steps.tabpfn-models-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          /home/runner/.virtualenvs/r-reticulate/bin/python - << 'EOF'
          from tabpfn.model_loading import download_all_models, get_cache_dir
          import logging
          logging.basicConfig(level=logging.INFO, format="%(message)s")
          cache_dir = get_cache_dir()
          cache_dir.mkdir(parents=True, exist_ok=True)
          print(f"Downloading all models to {cache_dir}")
          download_all_models(cache_dir)
          print(f"All models downloaded to {cache_dir}")
          EOF

      - name: Test coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          print(cov)
          covr::to_cobertura(cov)
        shell: Rscript {0}

      - uses: codecov/codecov-action@v4
        with:
          # Fail if error if not on PR, or if on PR and token is given
          fail_ci_if_error: ${{ github.event_name != 'pull_request' || secrets.CODECOV_TOKEN }}
          file: ./cobertura.xml
          plugin: noop
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Show testthat output
        if: always()
        run: |
          ## --------------------------------------------------------------------
          find '${{ runner.temp }}/package' -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package
